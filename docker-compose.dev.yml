# 开发环境：只启动后端，前端继续用 npm run dev
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tellme-backend-dev
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped
    networks:
      - tellme-network

networks:
  tellme-network:
    driver: bridge
