services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tellme-backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - tellme-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tellme-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - tellme-network

networks:
  tellme-network:
    driver: bridge
